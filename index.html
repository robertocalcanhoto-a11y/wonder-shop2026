<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mercado Livre e afiliada Wonder Shop</title>
  <style>
    /* Aqui dentro vai apenas CSS */
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
    }

    header {
      background-color: #ffe600;
      padding: 16px 30px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 3px solid #002d72;
    }
    .header-title {
      flex: 1;
      text-align: center;
      font-size: 22px;
      font-weight: bold;
      color: #002d72;
    }
    .header-right img {
      max-height: 60px;
      width: auto;
    }

    .category-section {
      max-width: 1240px;
      margin: 30px auto;
      padding: 0 20px;
    }
    .category-title {
      background-color: #002d72;
      color: #ffe600;
      padding: 14px;
      font-size: 20px;
      font-weight: bold;
      border-radius: 8px 8px 0 0;
    }
    .category-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      background: #fff;
      border: 2px solid #e0e0e0;
      border-top: none;
      border-radius: 0 0 8px 8px;
      padding: 14px;
    }

    .card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      padding: 10px;
      transition: 0.2s;
    }
    .card img {
      width: 120px;
      height: 100px;
      object-fit: cover;
      border-radius: 6px;
      margin-right: 10px;
    }
    .card-content h3 { font-size: 14px; margin-bottom: 4px; }
    .card-content p { font-size: 12px; margin-bottom: 4px; }
    .price-original { font-size: 12px; text-decoration: line-through; color: #999; }
    .discount { font-size: 12px; font-weight: bold; margin-left: 6px; color: #e74c3c; }
    .price-final { font-size: 13px; font-weight: bold; margin: 4px 0; color: #f57f17; }
    .buy-button {
      font-size: 12px;
      padding: 4px 8px;
      background-color: #002d72;
      color: #ffe600;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
    }
    .buy-button:hover { background-color: #0044aa; }

    @media (max-width: 900px) {
      .category-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .category-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header>
    <div class="header-title">Mercado Livre e afiliada Wonder Shop</div>
    <div class="header-right"><img src="logo.png" alt="Logo"></div>
  </header>

  <section class="category-section">
    <div class="category-title">Produtos em destaque</div>
    <div class="category-grid">
      <div class="card">
        <img src="produto1.jpg" alt="Produto 1">
        <div class="card-content">
          <h3>Produto 1</h3>
          <p>Descrição breve</p>
          <span class="price-original">R$ 100,00</span>
          <span class="discount">-20%</span>
          <div class="price-final">R$ 80,00</div>
          <a href="#" class="buy-button">Comprar</a>
        </div>
      </div>
      <!-- Repita para os outros 5 cards -->
    </div>
  </section>
</body>
</html>
