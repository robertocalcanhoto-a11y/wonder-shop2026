<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mercado Livre e afiliada Wonder Shop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      color: #002d72;
    }

    /* === HEADER === */
    header {
      background-color: #ffe600;
      padding: 16px 30px;
      display: flex;
      align-items: center;
      gap: 20px;
      border-bottom: 3px solid #002d72;
    }
    header img {
      max-height: 90px;
      width: auto;
      object-fit: contain;
      display: block;
    }
    .header-title {
      flex: 1;
      text-align: center;
      font-size: 26px;
      font-weight: bold;
      color: #002d72;
      letter-spacing: 0.5px;
    }
    .header-spacer {
      width: 180px;
      flex-shrink: 1;
    }

    /* === CATEGORY SECTION === */
    .category-section {
      max-width: 1240px;
      margin: 30px auto;
      padding: 0 20px;
    }
    .category-title {
      background-color: #002d72;
      color: #ffe600;
      padding: 14px 24px;
      font-size: 20px;
      font-weight: bold;
      border-radius: 8px 8px 0 0;
      letter-spacing: 0.5px;
    }
    .category-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      background-color: #fff;
      border: 2px solid #e0e0e0;
      border-top: none;
      border-radius: 0 0 8px 8px;
      padding: 14px;
    }

    /* === PRODUCT CARD === */
    .card {
      background-color: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      text-align: center;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }
    .card:hover {
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
      transform: translateY(-2px);
    }
    .card img {
      width: 150px;
      height: 90px;
      object-fit: cover;
      border-radius: 4px;
      background-color: #f0f0f0;
    }
    .card h3 {
      color: #002d72;
      font-size: 11px;
      margin: 6px 0 2px;
      line-height: 1.2;
      min-height: 25px;
    }
    .card p {
      color: #555;
      font-size: 10px;
      line-height: 1.2;
      margin-bottom: 4px;
      flex: 1;
    }
    .card .price {
      color: #f57f17;
      font-size: 12px;
      font-weight: bold;
      margin: 2px 0;
    }
    .card .promo {
      color: #fff;
      background-color: #e74c3c;
      font-size: 10px;
      font-weight: bold;
      padding: 2px 6px;
      border-radius: 3px;
      margin: 4px 0;
      display: inline-block;
    }
    .buy-button {
      display: block;
      background-color: #002d72;
      color: #ffe600;
      text-decoration: none;
      padding: 4px 6px;
      border-radius: 4px;
      font-weight: bold;
      font-size: 10px;
      width: 100%;
      text-align: center;
      transition: background-color 0.2s ease;
      margin-top: 4px;
    }
    .buy-button:hover { background-color: #0044aa; }

    /* === RESPONSIVE === */
    @media (max-width: 1200px) {
      .category-grid { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 768px) {
      .category-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 640px) {
      header { flex-wrap: wrap; justify-content: center; }
      .header-spacer { display: none; }
      .header-middle { display: none; }
      .header-title { font-size: 20px; width: 100%; }
      .category-grid { grid-template-columns: 1fr; }
      .category-section { margin: 20px auto; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="logo-area">
      <img src="https://raw.githubusercontent.com/robertocalcanhoto-a11y/wonder-shop2026/main/logomercadolivre.png" alt="Logo Mercado Livre">
    </div>
    <div class="header-title">Mercado Livre e afiliada Wonder Shop</div>
    <div class="header-middle">
      <img src="https://raw.githubusercontent.com/robertocalcanhoto-a11y/wonder-shop2026/main/logowondershop.png" alt="Logo Wonder Shop">
    </div>
    <div class="header-spacer"></div>
  </header>

  <!-- Aqui continuam suas seções de categorias e cards -->
  <!-- category-section, category-grid, cards etc. -->
  
</body>
</html>
