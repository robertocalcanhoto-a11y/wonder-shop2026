<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mercado Livre e afiliada Wonder Shop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
    }

    /* HEADER */
    header {
      background-color: #ffe600;
      padding: 16px 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 3px solid #002d72;
    }
    .header-left img { max-height: 60px; }
    .header-center { display: flex; align-items: center; gap: 10px; }
    .header-center h1 {
      font-size: 22px;
      font-weight: bold;
      color: #002d72;
      margin: 0;
      text-align: center;
    }
    .header-center img { max-height: 50px; }
    .header-right img { max-height: 60px; }

    /* SECTION BASE */
    .section {
      max-width: 1240px;
      margin: 30px auto;
      padding: 0 20px;
    }
    .section-title {
      background-color: #002d72;
      color: #ffe600;
      padding: 14px;
      font-size: 20px;
      font-weight: bold;
      border-radius: 8px 8px 0 0;
    }

    /* CATEGORY GRID */
    .category-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      background: #fff;
      border: 2px solid #e0e0e0;
      border-top: none;
      border-radius: 0 0 8px 8px;
      padding: 14px;
    }
    .category-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      text-align: center;
      padding: 10px;
    }
    .category-card img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 6px;
    }
    .category-card h3 { margin-top: 8px; font-size: 14px; }

    /* PRODUCT GRID */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      background: #fff;
      border: 2px solid #e0e0e0;
      border-top: none;
      border-radius: 0 0 8px 8px;
      padding: 14px;
    }
    .product-card {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      padding: 10px;
      transition: 0.2s;
    }
    .product-card:hover {
      box-shadow: 0 4px 14px rgba(0,0,0,0.12);
      transform: translateY(-2px);
    }
    .product-card img {
      width: 120px;
      height: 100px;
      object-fit: cover;
      border-radius: 6px;
      margin-right: 10px;
    }
    .card-content { flex: 1; }
    .card-content h3 { font-size: 14px; margin-bottom: 4px; }
    .card-content p { font-size: 12px; margin-bottom: 4px; }
    .price-original { font-size: 12px; text-decoration: line-through; color: #999; }
    .discount { font-size: 12px; font-weight: bold; margin-left: 6px; color: #e74c3c; }
    .price-final { font-size: 13px; font-weight: bold; margin: 4px 0; color: #f57f17; }
    .buy-button {
      font-size: 12px;
      padding: 4px 8px;
      background-color: #002d72;
      color: #ffe600;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
    }
    .buy-button:hover { background-color: #0044aa; }

    /* RESPONSIVO */
    @media (max-width: 900px) {
      .category-grid, .product-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .category-grid, .product-grid { grid-template-columns: 1fr; }
      .header-center h1 { font-size: 18px; }
    }
  </style>
</head>
<body>
  <!-- HEADER -->
  <header>
    <div class="header-left"><img src="logomercadolivre.png" alt="Mercado Livre"></div>
    <div class="header-center">
      <h1>Mercado Livre e afiliada Wonder Shop</h1>
      <img src="logowondershop.png" alt="Wonder Shop">
    </div>
    <div class="header-right"><img src="aviaologo.png" alt="Avião"></div>
  </header>

  <!-- CATEGORIES -->
  <section class="section">
    <div class="section-title">Categorias</div>
    <div class="category-grid">
      <div class="category-card"><img src="moda.jpg" alt="Moda"><h3>Moda</h3></div>
      <div class="category-card"><img src="decoracao.jpg" alt="Decoração"><h3>Decoração</h3></div>
      <div class="category-card"><img src="eletronicos.jpg" alt="Eletrônicos"><h3>Eletrônicos</h3></div>
      <div class="category-card"><img src="esporte.jpg" alt="Esporte"><h3>Esporte</h3></div>
      <div class="category-card"><img src="livros.jpg" alt="Livros"><h3>Livros</h3></div>
      <div class="category-card"><img src="beleza.jpg" alt="Beleza"><h3>Beleza</h3></div>
    </div>
  </section>

  <!-- PRODUCTS -->
  <section class="section">
    <div class="section-title">Produtos em destaque</div>
    <div class="product-grid">
      <div class="product-card">
        <img src="produto1.jpg" alt="Produto 1">
        <div class="card-content">
          <h3>Produto 1</h3>
          <p>Descrição breve do produto.</p>
          <span class="price-original">R$ 100,00</span>
          <span class="discount">-20%</span>
          <div class="price-final">R$ 80,00</div>
          <a href="#" class="buy-button">Comprar</a>
        </div>
      </div>
      <!-- Repita para os outros produtos -->
    </div>
  </section>
</body>
</html>
